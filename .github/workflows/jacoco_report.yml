name: CI JaCoCo Report

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: jacoco-report-${{ github.ref }}
  cancel-in-progress: true

env:
  # hint: "group thresholds" are in format: 'overall*changed-files-average*per-changed-file'
  REPORT_GROUPS: |
    - name: atum-agent
      paths:
        - 'agent/target/**/jacoco/report/jacoco.xml'
      thresholds: '67*80*0'
    - name: atum-reader
      paths:
        - 'reader/target/**/jacoco/report/jacoco.xml'
      thresholds: '73*80*0'
    - name: atum-model
      paths:
        - 'model/target/**/jacoco/report/jacoco.xml'
      thresholds: '35*80*0'
    - name: atum-server
      paths:
        - 'server/target/**/jacoco/report/jacoco.xml'
      thresholds: '71*80*0'

jobs:
  detect:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      scala_changed: ${{ steps.filter.outputs.scala }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          token: ""
          filters: |
            scala:
              - '**/*.scala'
              - '!project/**'

  jacoco-report:
    name: JaCoCo Report
    needs: detect
    if: needs.detect.outputs.scala_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: atum_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Scala
        uses: olafurpg/setup-scala@32ffa16635ff8f19cc21ea253a987f0fdf29844c
        with:
          java-version: "adopt@1.11.0-11"

      - name: Prepare testing database
        run: sbt flywayMigrate

      - name: Build and run tests with coverage
        continue-on-error: true
        run: sbt jacoco

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Add JaCoCo Report in PR comments
        uses: MoranaApps/jacoco-report@69351d88d18f7697c416e1bc2020ed05606d8120
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          global-thresholds: '0*80'
          report-thresholds-default: '0*0*0'
          skip-unchanged: 'true'
          evaluate-unchanged: 'false'
          report-groups: ${{ env.REPORT_GROUPS }}

  noop:
    name: No Operation
    needs: detect
    if: needs.detect.outputs.scala_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No changes in Scala related files — passing."