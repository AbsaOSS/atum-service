# Config used exclusively by AgentServerCompatibilityTests.
#
# It is deliberately NOT named reference.conf or application.conf: those are auto-loaded/merged by
# ConfigFactory.load() and would leak the "http" dispatcher into every other test (which rely on the
# "console" default in reference.conf). This file must be loaded explicitly via
# ConfigFactory.parseResources("agent-compat.conf") so it stays isolated to the compatibility test.
#
# Every value below is intentionally NON-default, to prove the agent honours a fully custom
# configuration when talking to the server.

atum.dispatcher.type="http"

# REST API URI of the atum server started for the compatibility run in CI.
atum.dispatcher.http.url="http://localhost:8080"

# Custom retry settings (built-in defaults are different).
atum.dispatcher.http.retry.max-retries=5
atum.dispatcher.http.retry.initial-delay-ms=250
atum.dispatcher.http.retry.max-delay-ms=8000

# Custom timeout settings (built-in defaults are different).
atum.dispatcher.http.timeout.connect-ms=7000
atum.dispatcher.http.timeout.read-ms=45000
atum.dispatcher.http.timeout.write-ms=12000
